name: Update SBOM Attestation Cache

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: read

jobs:
  update-sbom-cache:
    name: Fetch and cache SBOM attestations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore existing SBOM data cache (for incremental updates)
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            static/data/sbom-attestations.json
            static/data/sbom-attestations-frontend.json
          key: github-data-sbom-${{ github.run_id }}
          restore-keys: |
            github-data-sbom-

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Install oras
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Fetch SBOM attestation metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run fetch-sbom

      - name: Validate SBOM cache is non-empty
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('static/data/sbom-attestations.json', 'utf8'));
            const count = Object.values(data.streams || {}).reduce((acc, s) => acc + Object.keys(s.releases || {}).length, 0);
            console.log('Total releases in SBOM cache:', count);
            if (count === 0) { console.error('ERROR: SBOM cache is empty — all streams produced zero releases'); process.exit(1); }
          "

      - name: Save SBOM data cache
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            static/data/sbom-attestations.json
            static/data/sbom-attestations-frontend.json
          key: github-data-sbom-${{ github.run_id }}
