name: Update SBOM Attestation Cache

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: read

jobs:
  update-sbom-cache:
    name: Fetch and cache SBOM attestations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore existing SBOM data cache (for incremental updates)
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            static/data/sbom-attestations.json
            static/data/sbom-attestations-frontend.json
          key: github-data-sbom-${{ github.run_id }}
          restore-keys: |
            github-data-sbom-

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install oras
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Fetch SBOM attestation metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run fetch-sbom

      - name: Validate SBOM cache is non-empty
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('static/data/sbom-attestations.json', 'utf8'));
            const count = Object.values(data.streams || {}).reduce((acc, s) => acc + Object.keys(s.releases || {}).length, 0);
            console.log('Total releases in SBOM cache:', count);
            if (count === 0) { console.error('ERROR: SBOM cache is empty — all streams produced zero releases'); process.exit(1); }
          "

      - name: Save SBOM data cache
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            static/data/sbom-attestations.json
            static/data/sbom-attestations-frontend.json
          key: github-data-sbom-${{ github.run_id }}
