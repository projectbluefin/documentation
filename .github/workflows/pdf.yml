name: Generate Docs PDF
on:
  schedule:
    - cron: "50 5 * * 0" # 5:50 UTC Weekly on Sundays
  workflow_dispatch:

jobs:
  pdf:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Prepare Prince cache dirs
        run: |
          sudo mkdir -p /usr/local/lib/prince
          sudo chown -R "$USER" /usr/local/lib/prince
          sudo touch /usr/local/bin/prince
          sudo chown "$USER" /usr/local/bin/prince

      - name: Cache Prince XML
        id: cache-prince
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            /usr/local/lib/prince
            /usr/local/bin/prince
          key: prince-15.4.1-linux-x86_64-v2

      - name: Install Prince
        if: steps.cache-prince.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://www.princexml.com/download/prince-15.4.1-linux-generic-x86_64.tar.gz -o prince.tar.gz
          echo "4b91241934bbfc11041e81313c0e6770b76154bae34f06053302052c2e078fdd  prince.tar.gz" | sha256sum --check
          tar zxf prince.tar.gz
          cd prince-15.4.1-linux-generic-x86_64
          yes "" | sudo ./install.sh

      - name: Build PDF
        run: |
          mkdir -p pdf
          npx docusaurus-prince-pdf --toc -u https://docs.projectbluefin.io -o pdf/bluefin.pdf

      - name: Upload results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bluefin
          # The output filename can be specified with --output option
          path: pdf/bluefin.pdf
          if-no-files-found: error
          overwrite: true

      - name: Upload Release Artifact
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload --clobber 0.1 pdf/bluefin.pdf
