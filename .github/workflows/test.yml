name: Test Scripts

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
  merge_group:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Script unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
