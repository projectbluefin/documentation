name: Deploy to GitHub Pages

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "50 6 * * 0" # 6:50 UTC sundays

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Restore GitHub data cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: static/data
          key: github-data-${{ hashFiles('scripts/fetch-*.js') }}
          restore-keys: |
            github-data-sbom-
            github-data-

      - name: Restore curated artwork metadata (cache must not overwrite)
        # The github-data cache restores the entire static/data/ directory, which
        # overwrites artwork.json with a stale cached copy and loses manually curated
        # fields (e.g. coAuthor). Restore the committed version from the checkout so
        # hand-edited credits are always included in the build.
        run: git checkout -- static/data/artwork.json

      - name: Restore SBOM attestation cache (overrides general data cache)
        # Primary key will never match (update-sbom-cache.yml runs as a separate workflow
        # with a different run_id). The restore-keys fallback always applies, fetching
        # the most recent nightly SBOM cache saved by update-sbom-cache.yml.
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            static/data/sbom-attestations.json
            static/data/sbom-attestations-frontend.json
          key: github-data-sbom-${{ github.run_id }}
          restore-keys: |
            github-data-sbom-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Fetch data
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Always re-fetch image metadata on every build so hasAttestation,
          # versions, and security info stay current. IMAGES_REFRESH_HOURS: "0"
          # forces the per-product inner cache to also refresh (it defaults to
          # 336h and would otherwise serve stale nvidia tag data from GHA cache).
          IMAGES_CACHE_HOURS: "0"
          IMAGES_REFRESH_HOURS: "0"
          # Always re-fetch driver versions on every build so GNOME/kernel/mesa
          # versions stay current. The data is small (GitHub API call) and the
          # script's internal 168h TTL would otherwise serve stale cached data.
          DRIVER_VERSIONS_CACHE_HOURS: "0"
          # Always re-fetch firehose app data on every build so the changelogs
          # page shows current releases. The committed seed is an empty array;
          # without this the cache check sees a fresh mtime and skips the fetch.
          FIREHOSE_CACHE_HOURS: "0"
        run: npm run fetch-data

      - name: Fetch board data
        env:
          # fetch-board-data.js requires project:read scope; only this step
          # receives the elevated PAT — all other fetch scripts use github.token.
          GITHUB_TOKEN: ${{ secrets.PROJECT_READ_TOKEN }}
        run: node scripts/fetch-board-data.js

      - name: Generate embeddable card images
        run: npm run generate-card-images

      - name: Run TypeScript validation
        run: npm run typecheck

      - name: Run ESLint validation
        run: npm run lint

      - name: Run Prettier check (warnings only)
        run: npm run prettier-lint || true

      - name: Build website
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
