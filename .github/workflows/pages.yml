name: Deploy to GitHub Pages

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily (after nightly SBOM update at 04:00 UTC)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore GitHub data cache
        # Caches only files produced by fetch scripts. SBOM attestations,
        # github-profiles, and artwork.json are managed by dedicated caches
        # or the git checkout — they are intentionally excluded here so the
        # broad restore never overwrites them.
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            static/data/artwork-versions.json
            static/data/driver-versions.json
            static/data/file-contributors.json
            static/data/firehose-apps.json
            static/data/github-repos.json
            static/data/images.json
            static/data/playlist-metadata.json
            static/data/stream-pins.json
          key: github-data-${{ hashFiles('scripts/fetch-*.js') }}
          restore-keys: |
            github-data-

      - name: Restore GitHub profiles cache
        # Populated by update-github-profiles-cache.yml in a separate workflow.
        # Primary key never matches; restore-keys fetches the latest entry.
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: static/data/github-profiles.json
          key: github-profiles-v1-${{ github.run_id }}
          restore-keys: |
            github-profiles-v1-

      - name: Restore SBOM attestation cache
        id: sbom-cache
        # Populated by update-sbom-cache.yml nightly at 04:00 UTC.
        # Primary key never matches; restore-keys fetches the latest entry.
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            static/data/sbom-attestations.json
            static/data/sbom-attestations-frontend.json
          key: github-data-sbom-${{ github.run_id }}
          restore-keys: |
            github-data-sbom-

      - name: Fetch SBOM on cache miss
        if: steps.sbom-cache.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/fetch-github-sbom.js

      - name: Check SBOM data freshness
        run: node scripts/check-sbom-staleness.js

      - name: Fetch data
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Always re-fetch image metadata on every build so hasAttestation,
          # versions, and security info stay current. IMAGES_REFRESH_HOURS: "0"
          # forces the per-product inner cache to also refresh (it defaults to
          # 336h and would otherwise serve stale nvidia tag data from GHA cache).
          IMAGES_CACHE_HOURS: "0"
          IMAGES_REFRESH_HOURS: "0"
          # Always re-fetch driver versions on every build so GNOME/kernel/mesa
          # versions stay current. The data is small (GitHub API call) and the
          # script's internal 168h TTL would otherwise serve stale cached data.
          DRIVER_VERSIONS_CACHE_HOURS: "0"
          # Always re-fetch firehose app data on every build so the changelogs
          # page shows current releases. The committed seed is an empty array;
          # without this the cache check sees a fresh mtime and skips the fetch.
          FIREHOSE_CACHE_HOURS: "0"
        run: npm run fetch-data

      - name: Restore card image cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            static/img/cards
            static/data/card-hashes.json
          key: card-images-${{ hashFiles('scripts/generate-card-images.mjs', 'scripts/lib/card-template.mjs') }}
          restore-keys: |
            card-images-

      - name: Generate embeddable card images
        run: npm run generate-card-images

      - name: Run unit tests
        run: npm test

      - name: Run validation (typecheck + lint + prettier)
        run: |
          npm run typecheck &
          npm run lint &
          (npm run prettier-lint || true) &
          wait

      - name: Build website
        run: npm run build:ci

      - name: Run E2E tests
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        run: npx playwright install --with-deps chromium && npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
