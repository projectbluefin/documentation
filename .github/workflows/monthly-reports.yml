name: Generate Monthly Report

on:
  schedule:
    # First Monday of each month at 10:00 UTC
    - cron: "0 10 1-7 * 1"
  workflow_dispatch: # Allow manual triggering for testing

permissions:
  contents: write # For git commits
  pull-requests: write # For creating PRs and enabling auto-merge

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore known contributors cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: scripts/data/known-contributors.json
          key: contributor-cache-v1-${{ github.run_id }}
          restore-keys: |
            contributor-cache-v1-

      - name: Generate monthly report
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run generate-report
        continue-on-error: true

      - name: Check generation result
        if: steps.generate.outcome == 'failure'
        run: |
          echo "::warning::Report generation encountered errors but will attempt commit"

      - name: Create feature branch
        run: |
          BRANCH_NAME="monthly-report/$(date +%Y-%m)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Use -B to force-reset branch if it already exists from a prior failed run
          git checkout -B "$BRANCH_NAME"

      - name: Commit changes to branch
        run: |
          git add reports/ scripts/data/known-contributors.json
          git diff --staged --quiet || git commit -m "docs(reports): add monthly report for $(date +%B\ %Y)"

      - name: Save known contributors cache
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: scripts/data/known-contributors.json
          key: contributor-cache-v1-${{ github.run_id }}

      - name: Push branch and create PR
        run: |
          BRANCH_NAME="monthly-report/$(date +%Y-%m)"
          TODAY=$(date +%Y-%m-%d)
          # force-with-lease safely overwrites the branch if it exists from a prior failed run
          git push -u origin "$BRANCH_NAME" --force-with-lease
          # Only create the PR if one doesn't already exist for this branch
          if ! gh pr view "$BRANCH_NAME" --json number --jq '.number' > /dev/null 2>&1; then
            gh pr create \
              --title "docs(reports): Monthly report for $(date +%B\ %Y)" \
              --body "$(cat <<EOFBODY
          ## Automated Monthly Report

          This PR contains the automated monthly report generated on ${TODAY}.

          ### Contents
          - Monthly activity summary
          - Contributor statistics
          - Project updates

          ### Automated Checks
          - [ ] Build passes
          - [ ] No lint errors
          - [ ] Report renders correctly

          **Note:** This PR was automatically generated by the monthly-reports workflow.
          EOFBODY
          )" \
              --base main \
              --head "$BRANCH_NAME"
          else
            echo "PR already exists for $BRANCH_NAME — skipping creation"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: |
          BRANCH_NAME="monthly-report/$(date +%Y-%m)"
          gh pr merge --auto --merge "$BRANCH_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
