name: Generate Monthly Report

on:
  schedule:
    # First Monday of each month at 10:00 UTC
    - cron: "0 10 1-7 * 1"
  workflow_dispatch: # Allow manual triggering for testing

permissions:
  contents: write # For git commits
  pull-requests: write # For creating PRs

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore known contributors cache
        uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: scripts/data/known-contributors.json
          key: contributor-cache-v1-${{ github.run_id }}
          restore-keys: |
            contributor-cache-v1-

      - name: Generate monthly report
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run generate-report

      - name: Create feature branch
        run: |
          BRANCH_NAME="monthly-report/$(date +%Y-%m)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Use -B to force-reset branch if it already exists from a prior failed run
          git checkout -B "$BRANCH_NAME"

      - name: Commit changes to branch
        run: |
          git add reports/ scripts/data/known-contributors.json
          git diff --staged --quiet || git commit -m "docs(reports): add monthly report for $(date +%B\ %Y)"

      - name: Save known contributors cache
        uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: scripts/data/known-contributors.json
          key: contributor-cache-v1-${{ github.run_id }}

      - name: Push branch and create PR
        run: |
          BRANCH_NAME="monthly-report/$(date +%Y-%m)"
          # Re-add credentials for the push (persist-credentials: false on checkout)
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"
          TODAY=$(date +%Y-%m-%d)
          # --force is safe here because the workflow always resets the branch with
          # git checkout -B, and actions/checkout shallow clones don't track the
          # remote branch state, causing --force-with-lease to fail on re-runs.
          git push -u origin "$BRANCH_NAME" --force
          # Only create the PR if one doesn't already exist for this branch
          if ! gh pr view "$BRANCH_NAME" --json number --jq '.number' > /dev/null 2>&1; then
            gh pr create \
              --title "docs(reports): Monthly report for $(date +%B\ %Y)" \
              --body "$(cat <<EOFBODY
          ## Automated Monthly Report

          This PR contains the automated monthly report generated on ${TODAY}.

          ### Contents
          - Monthly activity summary
          - Contributor statistics
          - Project updates

          ### Automated Checks
          - [ ] Build passes
          - [ ] No lint errors
          - [ ] Report renders correctly

          **Note:** This PR was automatically generated by the monthly-reports workflow.
          EOFBODY
          )" \
              --base main \
              --head "$BRANCH_NAME"
          else
            echo "PR already exists for $BRANCH_NAME — skipping creation"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
