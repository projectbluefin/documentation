name: Update Hive History Cache

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-hive-history:
    name: Fetch and cache Hive history
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore existing Hive history cache (incremental updates)
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: static/data/hive-history.json
          key: hive-history-${{ github.run_id }}
          restore-keys: |
            hive-history-

      - name: Fetch Hive history snapshot + contributor stats
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HIVE_API_TOKEN: ${{ secrets.HIVE_API_TOKEN }}
        run: node scripts/fetch-hive-history.js

      - name: Validate Hive history output
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('static/data/hive-history.json', 'utf8'));
            const entries = (data.entries || []).length;
            const contributors = Object.keys(data.contributors || {}).length;
            console.log('Hive history entries:', entries);
            console.log('Contributor records:', contributors);
            if (entries === 0 && contributors === 0) {
              console.error('ERROR: hive-history.json produced no data');
              process.exit(1);
            }
          "

      - name: Save Hive history cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: static/data/hive-history.json
          key: hive-history-${{ github.run_id }}
