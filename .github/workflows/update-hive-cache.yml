name: Update Hive History Cache

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-hive-history:
    name: Fetch and cache Hive history
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore existing Hive history cache (incremental updates)
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: static/data/hive-history.json
          key: hive-history-${{ github.run_id }}
          restore-keys: |
            hive-history-

      - name: Fetch Hive history snapshot + contributor stats
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HIVE_API_TOKEN: ${{ secrets.HIVE_API_TOKEN }}
        run: node scripts/fetch-hive-history.js

      - name: Validate Hive history output
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('static/data/hive-history.json', 'utf8'));
            const entries = (data.entries || []).length;
            const contributors = Object.keys(data.contributors || {}).length;
            console.log('Hive history entries:', entries);
            console.log('Contributor records:', contributors);
            if (entries === 0 && contributors === 0) {
              console.error('ERROR: hive-history.json produced no data');
              process.exit(1);
            }
          "

      - name: Save Hive history cache
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: static/data/hive-history.json
          key: hive-history-${{ github.run_id }}
